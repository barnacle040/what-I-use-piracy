<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library - Direct Downloads</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-black text-white font-mono">
    <div class="section-container">
        <nav class="nav-links">
            <a href="index.html">← INDEX</a>
            <a href="Game_page.html" class="active">GAMES</a>
            <a href="torrent_1.html">TORRENTS</a>
            <a href="Software_Library.html">SOFTWARE</a>
        </nav>

        <header class="page-header">
            <h1>GAME LIBRARY</h1>
            <p class="subtitle">Direct links to safe and verified game downloads. <strong>Always use a VPN.</strong></p>
        </header>

        <div class="index-controls">
            <input type="text" id="searchInput" placeholder="Search games..." class="minimal-input">
            <select id="categoryFilter" class="minimal-select">
                <option value="all">ALL GENRES</option>
                <option value="action">ACTION</option>
                <option value="adventure">ADVENTURE</option>
                <option value="rpg">RPG</option>
                <option value="shooter">SHOOTER</option>
                <option value="open-world">OPEN WORLD</option>
            </select>
        </div>

        <div id="gameGrid" class="item-list">
            </div>

        <div class="pagination-list">
            <span class="page-label">PAGES:</span>
            <a href="Game_page.html" class="active">01</a>
            <a href="Game_page_2.html">02</a>
        </div>
    </div>

    <script>
        const games = [
            { id: 1, title: "Grand Theft Auto V", category: "open-world", year: 2013, size: "95 GB", url: "https://buzzheavier.com/ouvyovqmuez0" },
            { id: 2, title: "Red Dead Redemption 2", category: "open-world", year: 2018, size: "120 GB", url: "https://buzzheavier.com/ck7nob6r1bcv" },
            { id: 3, title: "The Last of Us Part I", category: "adventure", year: 2022, size: "75 GB", url: "https://buzzheavier.com/tcibtnfemphk" },
            { id: 4, title: "Cyberpunk 2077", category: "rpg", year: 2020, size: "70 GB", url: "https://buzzheavier.com/3nbhvi632e30" },
            { id: 5, title: "Elden Ring", category: "rpg", year: 2022, size: "50 GB", url: "https://buzzheavier.com/x9zkbd83m8bj" },
            { id: 6, title: "God of War Ragnarok", category: "action", year: 2022, size: "85 GB", url: "https://buzzheavier.com/7qzqvrto2lgy" },
            { id: 7, title: "Palworld", category: "adventure", year: 2024, size: "20 GB", url: "https://buzzheavier.com/85n7uzvvautg" },
            { id: 8, title: "Spider-Man: Miles Morales", category: "action", year: 2020, size: "50 GB", url: "https://buzzheavier.com/67pt5szrjk0h" },
            { id: 9, title: "Alan Wake 2", category: "adventure", year: 2023, size: "85 GB", url: "https://buzzheavier.com/xy2sm8ez5ult" },
            { id: 10, title: "Sniper Elite 5", category: "shooter", year: 2022, size: "60 GB", url: "https://buzzheavier.com/raidloxs5qya" }
        ];

        function renderGames(list = games) {
            const container = document.getElementById('gameGrid');
            container.innerHTML = list.map(game => `
                <a href="${game.url}" target="_blank" class="item-row">
                    <div class="item-main">
                        <span class="item-title">${game.title}</span>
                        <span class="item-meta">${game.category.toUpperCase()} • ${game.year}</span>
                    </div>
                    <span class="item-side">${game.size}</span>
                </a>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const filtered = games.filter(g => 
                (g.title.toLowerCase().includes(term)) && 
                (category === 'all' || g.category === category)
            );
            renderGames(filtered);
        });

        document.getElementById('categoryFilter').addEventListener('change', () => {
            document.getElementById('searchInput').dispatchEvent(new Event('input'));
        });

        document.addEventListener('DOMContentLoaded', () => renderGames());
    </script>
</body>
</html>
